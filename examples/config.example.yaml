# ProxyForge 配置示例
health_check_url: http://httpbin.org/ip
health_check_timeout: 10.0
health_check_interval: 60.0
unhealthy_check_interval: 300.0
unhealthy_backoff_factor: 2.0
unhealthy_check_max_interval: 3600.0
banned_check_interval: 300.0
health_check_concurrency: 20
health_check_batch_size: 100

min_score: 20.0
max_consecutive_failures: 3
banned_cooldown_seconds: 300.0
allow_unknown_proxies: false

# Phase 2: 租约与重试
lease_enabled: true
lease_ttl_seconds: 60.0
max_leases_per_proxy: 1
max_proxy_retries: 3
retry_http_codes:
  - 403
  - 429
  - 502
  - 503
  - 504

score_decay_per_failure: 10.0
score_boost_per_success: 5.0
latency_weight: 0.3
success_rate_weight: 0.7

# 滑动窗口评分
score_window_enabled: true
score_window_seconds: 3600.0
score_window_max_events: 500

# 持久化 flush
persist_batch_size: 10
persist_sync_fallback: true

user_agent: ProxyForge/0.3.0
tags:
  - cn
